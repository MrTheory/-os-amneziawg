# newsyslog configuration for AmneziaWG plugin
# Format: logfile [owner:group] mode count size(KB) when [flags] [/pidfile] [sigtype]
#
# Rotate when file exceeds 1 MB (1024 KB) or weekly (W0 = Sunday midnight),
# keep 5 archives, compress with gzip (Z flag).
/var/log/amneziawg.log	root:wheel	640	5	1024	@T00	GZ
