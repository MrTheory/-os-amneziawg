[start]
command:/usr/local/opnsense/scripts/AmneziaWG/amneziawg-service-control.php start
parameters:
type:script_output
message:Starting AmneziaWG

[stop]
command:/usr/local/opnsense/scripts/AmneziaWG/amneziawg-service-control.php stop
parameters:
type:script_output
message:Stopping AmneziaWG

[restart]
command:/usr/local/opnsense/scripts/AmneziaWG/amneziawg-service-control.php restart
parameters:
type:script_output
message:Restarting AmneziaWG

[reconfigure]
command:/usr/local/opnsense/scripts/AmneziaWG/amneziawg-service-control.php reconfigure
parameters:
type:script_output
message:Reconfiguring AmneziaWG

[status]
command:/usr/local/opnsense/scripts/AmneziaWG/amneziawg-service-control.php status
parameters:
type:script_output
message:AmneziaWG status

[version]
command:/usr/local/opnsense/scripts/AmneziaWG/amneziawg-service-control.php version
parameters:
type:script_output
message:AmneziaWG version

[gen_keypair]
command:/usr/local/opnsense/scripts/AmneziaWG/amneziawg-service-control.php gen_keypair
parameters:
type:script_output
message:Generating AmneziaWG keypair

[validate]
command:/usr/local/opnsense/scripts/AmneziaWG/amneziawg-service-control.php validate
parameters:
type:script_output
message:Validating AmneziaWG config

[ifstats]
command:/usr/local/opnsense/scripts/AmneziaWG/amneziawg-ifstats.php
parameters:
type:script_output
message:AmneziaWG interface stats

[testconnect]
command:/usr/local/opnsense/scripts/AmneziaWG/amneziawg-testconnect.php
parameters:
type:script_output
message:AmneziaWG connection test

[watchdog]
command:/usr/local/opnsense/scripts/AmneziaWG/amneziawg-watchdog.php
parameters:
type:script_output
message:AmneziaWG watchdog check

[log]
command:/usr/bin/tail
parameters:-n 150 /var/log/amneziawg.log
type:script_output
message:AmneziaWG log
